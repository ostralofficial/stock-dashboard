name: Collect DART Financial Data

on:
  schedule:
    # 매일 KST 08:00 (UTC 23:00) 실행 — 장 시작 전 데이터 갱신
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
    inputs:
      years:
        description: '수집 연도 범위 (예: 2022-2024)'
        required: false
        default: 'auto'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 최대 5시간

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase requests pandas

      - name: Run DART collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python collect_dart.py

      - name: Summary
        if: always()
        run: echo "DART 수집 완료"
