name: Update 52Week Data

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 매주 월~금 UTC 06:00 = KST 15:00
  workflow_dispatch:         # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase finance-datareader pandas

      - name: Run 52week update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_52week.py
